<!DOCTYPE html>
<html>
<head>
<title>Emaase Books - Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0D47A1;
}

.container{
    width:90%;
    max-width:350px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.logo{
    font-size:60px;
}

h2{
    color:#0D47A1;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.login{
    background:#0D47A1;
    color:white;
}

.signup{
    background:#FFD700;
    color:black;
}

a{
    text-decoration:none;
    color:#0D47A1;
    display:block;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">📖</div>

<h2>Emaase Books</h2>

<p>Welcome Back</p>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="login">Sign In</button>

<button class="signup">Create Account</button>

<a href="#">Forgot Password?</a>

<a href="#">Continue as Guest</a>

</div>

</body>
</html>
