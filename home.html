<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emaase Books - Home</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#0D47A1;
    color:white;
    padding:20px;
    text-align:center;
}

.search{
    padding:15px;
}

.search input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

.section{
    padding:15px;
}

.book{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.book h3{
    margin-top:0;
}

button{
    background:#0D47A1;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>📚 Emaase Books</h1>
<p>Welcome, Wayne!</p>
</header>

<div class="search">
<input type="text" placeholder="Search books...">
</div>

<div class="section">
<h2>Featured Books</h2>

<div class="book">
<h3>📖 Hardwork is the Mother of All Success</h3>
<p>Author: Wayne Emaase</p>
<button>Read Sample</button>
</div>

<div class="book">
<h3>📕 A Leader in the Shadow</h3>
<p>Status: Coming Soon</p>
<button disabled>Coming Soon</button>
</div>

</div>

</body>
</html>
