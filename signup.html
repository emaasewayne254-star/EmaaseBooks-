<!DOCTYPE html>
<html>
<head>
<title>Create Account - Emaase Books</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0D47A1;
}

.container{
    width:90%;
    max-width:380px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.logo{
    font-size:60px;
}

h2{
    color:#0D47A1;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0D47A1;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
}

a{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#0D47A1;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">📖</div>

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Create Password">

<input type="password" placeholder="Confirm Password">

<button>Create Account</button>

<a href="index.html">Already have an account? Sign In</a>

</div>

</body>
</html>
